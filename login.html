    <script>
        // CONFIGURAÇÃO DO SUPABASE
        const SUPABASE_URL = 'https://bdgyqbnemurjonszfpoo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkZ3lxYm5lbXVyam9uc3pmcG9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMjk2MzUsImV4cCI6MjA5NDcwNTYzNX0.UGDJifNskQMKVaE3gSJZbfaHvJmkjttaEHcT0Pxl1_A';
        
        // CORREÇÃO: usa 'supabase' (sem o 'Js') - a biblioteca carrega assim
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // VARIÁVEL GLOBAL PARA ACESSAR O CLIENTE
        window.supabase = supabaseClient;
        
        // FUNÇÃO DE MENSAGEM
        window.showMessage = function(text, isError = true) {
            const div = document.getElementById('messageDiv');
            div.className = isError ? 'error' : 'success';
            div.textContent = text;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 4000);
        };
        
        // FUNÇÃO DE LOGIN
        window.handleLogin = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                window.showMessage('Preencha e-mail e senha!');
                return;
            }
            
            const { error } = await window.supabase.auth.signInWithPassword({ email, password });
            if (error) {
                window.showMessage(error.message);
            } else {
                window.showMessage('Login realizado! Redirecionando...', false);
                setTimeout(() => {
                    window.location.href = '/Strategy-Hub/linkcare-vet/index.html';
                }, 1500);
            }
        };
        
        // FUNÇÃO DE CADASTRO
        window.handleSignup = async function() {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            
            if (!email || !password) {
                window.showMessage('Preencha e-mail e senha!');
                return;
            }
            if (password.length < 6) {
                window.showMessage('Senha: mínimo 6 caracteres!');
                return;
            }
            
            const { error } = await window.supabase.auth.signUp({ email, password });
            if (error) {
                window.showMessage(error.message);
            } else {
                window.showMessage('✅ Cadastrado! Verifique seu e-mail.', false);
                // Limpa os campos e volta para o login
                document.getElementById('signupEmail').value = '';
                document.getElementById('signupPassword').value = '';
                window.showLogin();
            }
        };
        
        // FUNÇÃO PARA MOSTRAR CADASTRO
        window.showSignup = function() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
        };
        
        // FUNÇÃO PARA MOSTRAR LOGIN
        window.showLogin = function() {
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        };
        
        // VERIFICA SESSÃO EXISTENTE
        window.supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = '/Strategy-Hub/linkcare-vet/index.html';
            }
        });
        
        console.log('✅ Página de login carregada corretamente');
        console.log('Supabase client:', window.supabase);
    </script>
